include:
  - compose.nats.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentos
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro

volumes:
  postgres_data:
